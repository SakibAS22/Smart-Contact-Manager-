<!DOCTYPE html>
<html
class="light"
  lang="en"
  th:fragment="parent(content, title, script)"
  xmlns:th="http://www.thymeleaf.org"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:replace="${title}">SCM</title>
    <!-- ! Font awsome link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" th:href="@{'/css/output.css'}" />
    <link
      href="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{'/css/style.css'}">

  </head>
  <body class="dark:bg-gray-700 bg-gray-100 dark:text-white  text-black">
    <!-- ! Common Header -->

    <!--  User is logged in : navbar  -->
    <th:block th:if="${loggedInUser}">
      <div th:replace="~{user/user_navbar::user-navbar}"></div>
    </th:block>

    <!-- user is not logged in: navbar -->
    <th:block th:unless="${loggedInUser}">
      <div data-th-replace="~{navbar :: navbar}"></div>
    </th:block>

    <!-- ! Main Content -->
    <div class="pt-24 px-4">
      <section th:replace="${content}"></section>
    </div>

    <!-- ! Common Footer -->

    <!-- <footer class="p-4">This is footer</footer> -->
    <!-- ! FlowBite Content -->
    <script src="https://cdn.jsdelivr.net/npm/flowbite@3.1.2/dist/flowbite.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script data-th-src="@{'/js/script.js'}"></script>
    <th:block th:replace="${script}"></th:block>
  </body>
</html>
