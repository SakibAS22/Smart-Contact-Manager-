<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <th:block th:replace="~{base :: parent(~{::#content}, ~{::#title}, ~{::#script})}">
    
    <th:block id="title">
      <title>All Your Contacts</title>
    </th:block>

    <div id="content">
      <!--! sidebar -->
       <!--! user is logged in: sidebar -->
      <div th:if="${loggedInUser}">
        <div  th:replace="~{user/sidebar::sidebar}"></div>
      </div>

    <div class="sm:pl-64" >
      <div class="">
      <h1 class="text-5xl text-center">All Your Contacts</h1>
      <p class="text-center">List of contacts...</p>

    <!-- ! Contact Container starts -->

    <div class="contacts_container p-5">        

<div class="relative overflow-x-auto shadow-md sm:rounded-lg">
        <div th:replace="~{message :: messagebox}"> </div>
        <form
            th:object="${contactSearchForm}" 
            action="" th:action="@{'/user/contacts/search'}" >
            <div class="flex space-x-3 p-5 items-center justify-start flex-column flex-wrap md:flex-row space-y-4 md:space-y-0 pb-4 bg-white dark:bg-gray-900">
        <!-- ! select box -->
        <div>
            <select 
                th:field="*{field}"
                id="countries_disabled" 
                class="appearance-none bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg 
                     focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 pr-8
                     dark:bg-gray-800 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white
                     dark:focus:ring-blue-500 dark:focus:border-blue-500">
        <option selected value="">Select Field</option>
        <option value="name">Name</option>
        <option value="phone">Phone</option>
        <option value="email">Email</option>
    </select>  
        </div>
        <label for="table-search" class="sr-only">Search</label>
        <div class="relative">
            <div class="absolute inset-y-0 rtl:inset-r-0 start-0 flex items-center ps-3 pointer-events-none">
                <svg class="w-4 h-4 text-gray-500 dark:text-gray-400" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 20 20">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z"/>
                </svg>
            </div>
            <input 
                th:field="*{value}"
                type="text" id="table-search-users" class="block p-2 ps-10 text-sm text-gray-900 border border-gray-300 rounded-lg w-80 bg-gray-50 focus:ring-blue-500 focus:border-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" 
                placeholder="Search for users">
        </div>
        <button 
            type="submit"
            class="px-3 py-2 bg-blue-600 text-white rounded">Search</button>
    </div>
    </form>        

    <!-- ! Table -->
    <table 
        th:if="${pageContact.totalElements>0}"
        class="w-full text-sm text-left rtl:text-right text-gray-500 dark:text-gray-400">
        <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
            <tr>
                <th scope="col" class="px-6 py-3">
                    Name
                </th>
                <th scope="col" class="px-6 py-3">
                    Phone
                </th>
                <th scope="col" class="px-6 py-3">
                    Links
                </th>
                <th scope="col" class="px-6 py-3">
                    Action
                </th>
            </tr>
        </thead>
        <tbody>
            <tr 
                th:object="${c}"
                th:each="c:${pageContact.getContent()}"
                class="bg-white border-b dark:bg-gray-800 dark:border-gray-700 border-gray-200 hover:bg-gray-50 dark:hover:bg-gray-600">
                
                <th scope="row" class="flex items-center px-6 py-4 text-gray-900 whitespace-nowrap dark:text-white">
                    <img
                        onerror="this.src='https://cdn.vectorstock.com/i/750p/92/16/default-profile-picture-avatar-user-icon-vector-46389216.avif'"
                        th:src="@{*{picture}}" 
                        class="w-10 h-10 rounded-full" src="/docs/images/people/profile-picture-1.jpg" alt="Jese image">
                    <div class="ps-3">
                        <div
                            th:text="*{name}" 
                            class="text-base font-semibold">Neil Sims</div>
                        <div
                            th:text="*{email}" 
                            class="font-normal text-gray-500">neil.sims@flowbite.com</div>
                    </div>  
                </th>
                <td 
                    class="px-6 py-4">
                    <i class="fa-solid fa-phone w-4 h-4"></i>
                    <span th:text="*{phoneNumber}"></span>
                </td>
                <td class="px-6 py-4">
                    <div class="flex items-center">
                        <div 
                            th:if="*{favorite}"
                            class="h-2.5 w-2.5 rounded-full bg-green-500 me-2">
                        </div>
                        <a th:href="@{*{websiteLink}}" target="_blank"
                        ><i class="fa-solid fa-link w-6 h-6"></i></a>
                        <a th:href="@{*{linkedInLink}}" target="_blank"
                        ><i class="fa-brands fa-linkedin w-6 h-6"></i></a>
                    </div>
                </td>
                <td class="px-6 py-4">
                    <div>
                        <!-- ! Delete contact -->
                        <!-- <a th:href="@{'/user/contacts/delete/'+*{id} }" ><i class="fa-solid fa-trash w-6 h-6 text-red-500 hover:text-red-700"></i></a> -->
                        <button th:onclick="deleteContact([[${c.id}]])" ><i class="fa-solid fa-trash w-6 h-6 text-red-500 hover:text-red-700">
                        </i></button>
                        <!-- ! edit contact -->
                        <a th:href="@{'/user/contacts/view/'+*{id} }" ><i class="fa-solid fa-pen w-6 h-6 text-blue-500 hover:text-blue-700"></i></a>
                        <!-- !View contact -->
                        <button 
                            th:onclick="loadContactData([[${c.id}]])"><i class="fa-solid fa-eye w-6 h-6 text-green-500 hover:text-green-700"></i></button>
                    </div>
                </td>
            </tr>
            
        </tbody>
    </table>
    <!-- ! Pagination COmponent -->
    <div 
        th:if="${pageContact.totalElements>0}"
        class="pagination_container p-5 text-center bg-white dark:bg-gray-800">
        <nav aria-label="Page navigation example">
  <ul class="inline-flex -space-x-px text-base h-10">
    <li>
      <a
        th:href="@{'/user/contacts?size= '+${pageSize}+'&page='+ ${pageContact.number-1}}"
        th:unless="${pageContact.first}"
        href="#" class="flex items-center justify-center px-4 h-10 ms-0 leading-tight text-gray-500 bg-white border border-e-0 border-gray-300 rounded-s-lg hover:bg-gray-100 hover:text-gray-700 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white">
            Previous</a>
    <li th:each="index :${#numbers.sequence(0, pageContact.totalPages-1)}">
      <a
        data-th-href="@{'/user/contacts?size='+${pageSize}+'&page='+${index}}"
        href="#" class="flex items-center justify-center px-4 h-10 leading-tight text-gray-500  border border-gray-300 hover:bg-gray-100 hover:text-gray-700  dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white"
        th:classappend="${index==pageContact.number? 'bg-blue-50 dark:bg-gray-600':'bg-white dark:bg-gray-800'}"
        >
        <span th:text="${index +1}"></span>
        </a>
    </li>
    <li>
      <a
        th:href="@{'/user/contacts?size='+${pageSize}+'&page='+ ${pageContact.number+1}}"
        th:unless="${pageContact.last}"
        href="#" class="flex items-center justify-center px-4 h-10 leading-tight text-gray-500 bg-white border border-gray-300 rounded-e-lg hover:bg-gray-100 hover:text-gray-700 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-400 dark:hover:bg-gray-700 dark:hover:text-white">
        Next</a>
    </li>
  </ul>
</nav>
    </div>
        <h1 class="text-5xl text-center text-black bg-white p-5 dark:bg-gray-800 dark:text-white" 
        th:if="${pageContact.totalElements ==0}">No result found</h1>
    </div>

      </div>
      </div>
    <div th:replace="~{user/contact_modals :: contact}"></div>
    </div>
    </div>
    <th:block id="script">
        <script th:src="@{'/js/contacts.js'}"></script>
      <script>
        console.log("THis is a Profile page");
      </script>
    </th:block>

  </th:block>
</html>
