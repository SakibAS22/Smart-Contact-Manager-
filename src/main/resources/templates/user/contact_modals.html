<div th:fragment="contact">

<!-- Modal toggle -->


<!-- Main modal -->
<div id="view_contact_modal" tabindex="-1" aria-hidden="true" class="hidden overflow-y-auto overflow-x-hidden fixed top-0 right-0 left-0 z-50 justify-center items-center w-full md:inset-0 h-[calc(100%-1rem)] max-h-full">
    <div class="relative p-4 w-full max-w-xl max-h-full">
        <!--! Modal content -->
        <div class="relative bg-white rounded-lg shadow-sm dark:bg-gray-700">
            <!--! Modal header -->
        <div class="flex flex-col items-center p-4 md:p-5 border-b rounded-t dark:border-gray-600 border-gray-200 relative">
            <!-- ! image overlay -->
            <img class="h-40 w-40 rounded-full cursor-pointer" id="contact_image" alt="">

            <!--! Fullscreen overlay -->
            <div id="image_overlay" class="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center hidden z-50">
                <img id="overlay_img" class="max-w-full max-h-full rounded-lg">
            </div>
            
            <h3 id="contact_name" class="text-xl font-semibold text-gray-900 dark:text-white mt-2">
                Terms of Service
            </h3>
            <p class="text-gray-700 dark:text-gray-300" id="contact_email"></p>
        
            <button type="button" 
                class="absolute top-2 right-2 text-gray-400 bg-transparent hover:bg-gray-200 hover:text-gray-900 rounded-lg text-sm w-8 h-8 inline-flex justify-center items-center dark:hover:bg-gray-600 dark:hover:text-white" 
                onclick="closeContactModel()">
                <svg class="w-3 h-3" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 14 14">
                    <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                        d="m1 1 6 6m0 0 6 6M7 7l6-6M7 7l-6 6"/>
                </svg>
                <span class="sr-only">Close modal</span>
            </button>
        </div>

            <!--! Modal body -->
            <div class="p-4 md:p-5 space-y-4">
                
            <table class="w-full border-collapse">
                <tr class="border-b">
                    <td class="p-4 text-center w-12">
                        <i class="fa-solid fa-phone"></i>
                    </td>
                    <td id="contact_number" class="p-4 text-center">
                        Phone Number
                    </td>
                </tr>
                <tr class="border-b">
                    <td class="p-4 text-center w-12">
                        <i class="fa-solid fa-location-dot"></i>
                    </td>
                    <td id="contact_address" class="p-4 text-center">
                        Address
                    </td>
                </tr>
                <tr class="border-b">
                    <td class="p-4 text-center w-12">
                        <i class="fas fa-file-lines"></i>
                    </td>
                    <td id="contact_description" class="p-4 text-center">
                        Address
                    </td>
                </tr>
                <tr class="border-b">
                    <td class="p-4 text-center w-12">
                        <i class="fas fa-link"></i>
                    </td>
                    <td class="p-4 text-center">
                        <a id="contact_webLink" class="text-blue-600 hover:underline ">
                            Website Link
                        </a>
                    </td>
                </tr>   
                <tr class="border-b">
                    <td class="p-4 text-center w-12">
                        <i class="fa-brands fa-linkedin"></i>
                    </td>
                    <td class="p-4 text-center">
                        <a id="contact_linkedInLink" class="text-blue-600 hover:underline">
                            LinkedIn
                        </a>
                             </td>
                         </tr>
                <tr id="contact_isFavorite_row" class="border-b">
                      <td class="p-4 text-center w-12 pr-6">
                            <i id="contact_isFavorite_icon" class="fa-solid fa-heart" aria-hidden="true"></i>
                          </td>
                          <td id="contact_isFavorite" class="p-4 text-center">
                        </td>
                </tr>

            </table>
            </div>
            <!--! Modal footer -->
            <div class="flex items-center justify-center p-4 md:p-5 border-gray-200 rounded-b dark:border-gray-600">
                <button 
                    onclick="closeContactModel()"
                     type="button" class="py-2.5 px-5 ms-3 text-sm font-medium text-gray-900 focus:outline-none bg-white rounded-lg border border-gray-200 hover:bg-gray-100 hover:text-blue-700 focus:z-10 focus:ring-4 focus:ring-gray-100 dark:focus:ring-gray-700 dark:bg-gray-800 dark:text-gray-400 dark:border-gray-600 dark:hover:text-white dark:hover:bg-gray-700">Close</button>
            </div>
        </div>
    </div>
</div>

</div>
